services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: evonexus-dashboard
    ports:
      - "8080:8080"
    # Dica: Insira suas chaves na aba 'Environment' do Dokploy em vez de depender do .env
    environment:
      - TZ=America/Sao_Paulo
      - EVONEXUS_PORT=8080
    volumes:
      - config-data:/workspace/config
      - workspace-data:/workspace/workspace
      - dashboard-data:/workspace/dashboard/data
      - memory-data:/workspace/memory
      - adw-logs:/workspace/ADWs/logs
      - agent-memory:/workspace/.claude/agent-memory
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  runner:
    build: .
    container_name: evonexus-runner
    environment:
      - TZ=America/Sao_Paulo
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - config-data:/workspace/config
      - workspace-data:/workspace/workspace
      - memory-data:/workspace/memory
      - adw-logs:/workspace/ADWs/logs
      - agent-memory:/workspace/.claude/agent-memory
    profiles:
      - manual

volumes:
  config-data:
  workspace-data:
  dashboard-data:
  memory-data:
  adw-logs:
  agent-memory:
